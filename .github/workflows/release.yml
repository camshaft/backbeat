on:
  push:
    tags:
      - "v*"
  # Allow producing binaries on demand (e.g. to test the pipeline) without cutting a tag. A manual
  # run uploads workflow artifacts but does not create/modify a GitHub Release.
  workflow_dispatch:

name: release

permissions:
  # Needed to create the GitHub Release and upload the binaries to it.
  contents: write

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # The binary cargo builds and the name we publish it under.
  BIN_NAME: backbeat

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fully static Linux binaries via musl — download and run on any Linux host, no libc
          # version to match. This is the "grab the binary and convert a dump on the box" case. Each
          # builds natively on a runner of its own arch (GitHub now offers ARM Linux runners), so no
          # cross-compilation is needed.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          # Apple silicon. macOS cannot produce a fully static binary (the system libs are always
          # dynamic), but this is otherwise self-contained.
          - target: aarch64-apple-darwin
            os: macOS-latest

    steps:
      - uses: actions/checkout@v6

      # musl-tools provides the `musl-gcc` linker the *-linux-musl targets need.
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
          rustup target add ${{ matrix.target }}

      - uses: camshaft/rust-cache@v1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p backbeat-cli

      # Package the single binary as a tar.gz named for the target, so a release has one obvious
      # artifact per platform. The musl binaries are static; verify and strip to keep them small.
      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          test -f "$BIN"
          # Strip to shrink the artifact (best-effort; cross images ship the right strip).
          strip "$BIN" || true
          STAGE="${BIN_NAME}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/"
          cp README.md LICENSE "$STAGE/" || true
          ARCHIVE="${STAGE}.tar.gz"
          tar -czf "$ARCHIVE" "$STAGE"
          # Checksum so a downloader can verify the artifact.
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

      # On a tag push, attach the per-target archive (and its checksum) to the GitHub Release. The
      # release is created on the first upload and appended to by the rest of the matrix.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

  # Publish the three crates to crates.io. Gated on `build` so we never publish a tag whose binaries
  # don't compile, and only on a real tag push (a manual `workflow_dispatch` run produces artifacts
  # without touching the registry). Requires a `CARGO_REGISTRY_TOKEN` repo secret.
  publish:
    name: publish to crates.io
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable

      - uses: camshaft/rust-cache@v1

      # Publish in dependency order: macros, then the library that re-exports them, then the CLI.
      # `cargo publish` (Rust 1.66+) blocks until each version is live on the index before returning,
      # so the next crate in line resolves it. The workspace path deps carry an explicit `version`,
      # so cargo strips the local path and points at the just-published crates.io release.
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --locked -p backbeat-macros
          cargo publish --locked -p backbeat
          cargo publish --locked -p backbeat-cli
